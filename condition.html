<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>コンディション</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #c8c8d8; font-family: -apple-system, sans-serif;
         min-height: 100vh; display: flex; flex-direction: column; align-items: center;
         justify-content: center; padding: 24px; text-align: center; }
  h1 { font-size: 1.1rem; color: #7c6af7; margin-bottom: 8px; letter-spacing: 0.05em; }
  .subtitle { font-size: 0.8rem; color: #555568; margin-bottom: 28px; }
  .task { font-size: 0.85rem; color: #c8c8d8; background: #12121a; border: 1px solid #1e1e2e;
           border-radius: 8px; padding: 12px 16px; margin-bottom: 32px; line-height: 1.5; }
  .btn { display: block; width: 100%; padding: 18px; border-radius: 12px; border: none;
          font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; cursor: pointer;
          transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn:active { opacity: 0.7; }
  .btn-green  { background: rgba(68,170,100,0.2); border: 1px solid #44aa64; color: #7fc8a0; }
  .btn-yellow { background: rgba(200,180,50,0.2); border: 1px solid #c8b432; color: #c8b47a; }
  .btn-red    { background: rgba(200,60,60,0.2);  border: 1px solid #c83c3c; color: #c87a7a; }
  .result { margin-top: 24px; font-size: 0.85rem; color: #555568; min-height: 24px; }
  .claude-btn { display: none; margin-top: 16px; padding: 14px; background: rgba(200,60,60,0.15);
                 border: 1px solid #c87a7a; border-radius: 10px; color: #c87a7a;
                 font-size: 0.9rem; text-decoration: none; width: 100%; text-align: center; }
</style>
</head>
<body>
  <h1>今日のコンディションは？</h1>
  <div class="subtitle">ボタンを1つ押すだけでOK</div>
  <div class="task">📌 制作物の機能説明プロンプトを作成・送付</div>
  <button class="btn btn-green"  onclick="report('🟢')">🟢　普通</button>
  <button class="btn btn-yellow" onclick="report('🟡')">🟡　きつい</button>
  <button class="btn btn-red"    onclick="report('🔴')">🔴　無理</button>
  <div class="result" id="result"></div>
  <a class="claude-btn" id="claude-btn" href="https://claude.ai">👉 Claudeに話しかける（音声OK）</a>
  <script>
    async function report(emoji) {
      document.getElementById('result').textContent = '送信中...';
      try {
        await fetch('https://discord.com/api/webhooks/1480211283952406600/8Mk4PMjzpnbFx9WjD1l3GUcheE7135I4dotj5CbtE7XBq3-W-SeueozdQeC7pzLAHRjP', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({content: emoji})
        });
        document.getElementById('result').textContent = '✓ 送信しました';
        if (emoji === '🔴') {
          document.getElementById('claude-btn').style.display = 'block';
        }
      } catch(e) {
        document.getElementById('result').textContent = '送信失敗 — ネット接続を確認してください';
      }
    }
  </script>
</body>
</html>
